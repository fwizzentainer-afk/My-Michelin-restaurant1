services:
  - type: web
    name: my-michelin-web
    runtime: node
    plan: starter
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: my-michelin-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: my-michelin-db
    plan: basic-256mb
    databaseName: michelin
    user: michelin
